<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Dengue Watch — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0A1628;
    --navy-card: #111E35;
    --navy-border: #1C2E4A;
    --teal: #00D4AA;
    --teal-dim: rgba(0,212,170,0.12);
    --teal-glow: rgba(0,212,170,0.3);
    --amber: #FF6B35;
    --amber-dim: rgba(255,107,53,0.12);
    --red: #FF3D6B;
    --red-dim: rgba(255,61,107,0.12);
    --slate: #8892A4;
    --white: #F0F4FF;
    --white-dim: rgba(240,244,255,0.06);
    --green: #00D4AA;
    --green-dim: rgba(0,212,170,0.12);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    font-family:'Inter',sans-serif;
    background:var(--navy);
    color:var(--white);
    min-height:100vh;
    overflow-x:hidden;
  }

  /* ── LOGIN SCREEN ── */
  #login-screen {
    position:fixed; inset:0; z-index:200;
    background:var(--navy);
    display:flex; align-items:center; justify-content:center;
    padding:24px;
  }
  .login-card {
    background:var(--navy-card);
    border:1px solid var(--navy-border);
    border-radius:20px;
    padding:36px 28px;
    width:100%; max-width:360px;
  }
  .login-logo {
    font-family:'Space Grotesk',sans-serif;
    font-weight:700; font-size:18px;
    display:flex; align-items:center; gap:8px;
    margin-bottom:6px;
  }
  .login-logo .dot {
    width:9px; height:9px; border-radius:50%;
    background:var(--teal); box-shadow:0 0 10px var(--teal);
  }
  .login-sub {
    font-size:12px; color:var(--slate); margin-bottom:28px;
    letter-spacing:0.5px;
  }
  .field-label {
    font-size:11px; font-weight:500; letter-spacing:1px;
    color:var(--slate); text-transform:uppercase; margin-bottom:8px;
    display:block;
  }
  .field-input {
    width:100%;
    background:var(--navy);
    border:1px solid var(--navy-border);
    border-radius:10px;
    padding:12px 14px;
    font-family:'Inter',sans-serif;
    font-size:14px;
    color:var(--white);
    outline:none;
    transition:border-color 0.2s;
    margin-bottom:20px;
  }
  .field-input:focus { border-color:var(--teal); }
  .field-input::placeholder { color:var(--slate); }
  .btn-primary {
    width:100%;
    background:var(--teal);
    color:var(--navy);
    border:none;
    border-radius:10px;
    padding:13px;
    font-family:'Space Grotesk',sans-serif;
    font-size:14px; font-weight:600;
    cursor:pointer;
    transition:opacity 0.2s, transform 0.1s;
  }
  .btn-primary:active { transform:scale(0.98); opacity:0.9; }
  .btn-primary:disabled { opacity:0.5; cursor:not-allowed; }
  .login-error {
    font-size:12px; color:var(--red);
    margin-top:12px; text-align:center; display:none;
  }

  /* ── NAV ── */
  nav {
    position:fixed; top:0; left:0; right:0; z-index:100;
    background:rgba(10,22,40,0.92);
    backdrop-filter:blur(16px);
    border-bottom:1px solid var(--navy-border);
    padding:14px 20px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .nav-logo {
    font-family:'Space Grotesk',sans-serif;
    font-weight:700; font-size:17px; letter-spacing:-0.3px;
    display:flex; align-items:center; gap:8px;
  }
  .nav-logo .dot {
    width:9px; height:9px; border-radius:50%;
    background:var(--teal); box-shadow:0 0 10px var(--teal);
  }
  .admin-badge {
    font-size:10px; font-weight:600; letter-spacing:1px;
    color:var(--amber); background:var(--amber-dim);
    border:1px solid rgba(255,107,53,0.25);
    padding:3px 9px; border-radius:20px;
    text-transform:uppercase;
  }
  .btn-logout {
    font-size:12px; color:var(--slate);
    background:none; border:none; cursor:pointer;
    font-family:'Inter',sans-serif;
    padding:6px 10px;
    border-radius:8px;
    transition:background 0.15s;
  }
  .btn-logout:hover { background:var(--white-dim); color:var(--white); }

  /* ── MAIN ── */
  #app { padding-top:60px; display:none; }

  /* ── SUMMARY STRIP ── */
  .summary-strip {
    display:flex; gap:10px; padding:20px 20px 0;
    overflow-x:auto; scrollbar-width:none;
  }
  .summary-strip::-webkit-scrollbar { display:none; }
  .s-chip {
    flex:0 0 auto;
    background:var(--navy-card);
    border:1px solid var(--navy-border);
    border-radius:14px; padding:14px 18px; min-width:110px;
  }
  .s-chip .s-label {
    font-size:10px; font-weight:500; letter-spacing:1px;
    color:var(--slate); text-transform:uppercase; margin-bottom:6px;
  }
  .s-chip .s-val {
    font-family:'Space Grotesk',sans-serif;
    font-size:22px; font-weight:700;
  }
  .s-chip.pending .s-val { color:var(--amber); }
  .s-chip.verified .s-val { color:var(--teal); }
  .s-chip.dismissed .s-val { color:var(--slate); }
  .s-chip.total .s-val { color:var(--white); }

  /* ── FILTER BAR ── */
  .filter-bar {
    display:flex; gap:8px; padding:16px 20px;
    overflow-x:auto; scrollbar-width:none;
  }
  .filter-bar::-webkit-scrollbar { display:none; }
  .filter-btn {
    flex:0 0 auto;
    font-family:'Inter',sans-serif;
    font-size:12px; font-weight:500;
    padding:7px 16px; border-radius:20px;
    border:1px solid var(--navy-border);
    background:var(--navy-card);
    color:var(--slate); cursor:pointer;
    transition:all 0.15s;
  }
  .filter-btn.active {
    background:var(--teal-dim);
    border-color:rgba(0,212,170,0.3);
    color:var(--teal);
  }
  .filter-btn:active { transform:scale(0.96); }

  /* ── REPORT CARDS ── */
  .reports-wrap { padding:0 20px 32px; }
  .report-card {
    background:var(--navy-card);
    border:1px solid var(--navy-border);
    border-radius:16px;
    padding:16px;
    margin-bottom:10px;
    transition:border-color 0.2s;
  }
  .report-card.just-actioned {
    border-color:var(--teal-glow);
    opacity:0.5;
    pointer-events:none;
  }
  .rc-top {
    display:flex; align-items:flex-start;
    justify-content:space-between; gap:10px;
    margin-bottom:10px;
  }
  .rc-id {
    font-size:10px; color:var(--slate);
    font-family:'Space Grotesk',sans-serif;
    letter-spacing:0.5px; margin-bottom:4px;
  }
  .rc-location {
    font-family:'Space Grotesk',sans-serif;
    font-size:15px; font-weight:600;
  }
  .rc-tag {
    flex:0 0 auto;
    font-size:10px; font-weight:600; letter-spacing:0.8px;
    padding:4px 10px; border-radius:20px;
    text-transform:uppercase;
  }
  .rc-tag.confirmed { background:var(--teal-dim); color:var(--teal); border:1px solid rgba(0,212,170,0.2); }
  .rc-tag.suspected { background:var(--amber-dim); color:var(--amber); border:1px solid rgba(255,107,53,0.2); }
  .rc-tag.death     { background:var(--red-dim); color:var(--red); border:1px solid rgba(255,61,107,0.2); }
  .rc-tag.cluster   { background:var(--white-dim); color:var(--white); border:1px solid var(--navy-border); }

  .rc-meta {
    display:grid; grid-template-columns:1fr 1fr; gap:6px;
    margin-bottom:12px;
  }
  .rc-meta-item { font-size:12px; }
  .rc-meta-item .m-label { color:var(--slate); margin-bottom:2px; font-size:10px; text-transform:uppercase; letter-spacing:0.5px; }
  .rc-meta-item .m-val { color:var(--white); font-weight:500; }

  .rc-details {
    font-size:12px; color:var(--slate);
    line-height:1.5; margin-bottom:12px;
    padding:10px 12px;
    background:rgba(240,244,255,0.03);
    border-radius:8px; border:1px solid var(--navy-border);
    display:none;
  }
  .rc-details.show { display:block; }

  .rc-status-row {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:12px;
  }
  .rc-status {
    display:flex; align-items:center; gap:6px;
    font-size:11px; font-weight:500;
  }
  .status-dot {
    width:7px; height:7px; border-radius:50%;
  }
  .status-dot.pending  { background:var(--amber); box-shadow:0 0 6px var(--amber); }
  .status-dot.verified { background:var(--teal);  box-shadow:0 0 6px var(--teal); }
  .status-dot.dismissed { background:var(--slate); }
  .rc-time { font-size:11px; color:var(--slate); }

  .rc-actions { display:flex; gap:8px; }
  .btn-verify {
    flex:1;
    background:var(--teal-dim);
    color:var(--teal);
    border:1px solid rgba(0,212,170,0.25);
    border-radius:10px; padding:10px;
    font-family:'Space Grotesk',sans-serif;
    font-size:13px; font-weight:600;
    cursor:pointer; transition:all 0.15s;
  }
  .btn-verify:hover { background:rgba(0,212,170,0.2); }
  .btn-verify:active { transform:scale(0.97); }
  .btn-dismiss {
    flex:1;
    background:var(--red-dim);
    color:var(--red);
    border:1px solid rgba(255,61,107,0.2);
    border-radius:10px; padding:10px;
    font-family:'Space Grotesk',sans-serif;
    font-size:13px; font-weight:600;
    cursor:pointer; transition:all 0.15s;
  }
  .btn-dismiss:hover { background:rgba(255,61,107,0.2); }
  .btn-dismiss:active { transform:scale(0.97); }
  .btn-details {
    background:var(--white-dim);
    color:var(--slate);
    border:1px solid var(--navy-border);
    border-radius:10px; padding:10px 14px;
    font-family:'Inter',sans-serif;
    font-size:12px;
    cursor:pointer; transition:all 0.15s;
    white-space:nowrap;
  }
  .btn-details:hover { color:var(--white); }

  /* verified/dismissed cards hide action buttons */
  .rc-actions.hidden { display:none; }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align:center; padding:60px 20px;
    color:var(--slate); display:none;
  }
  .empty-state .e-icon { font-size:40px; margin-bottom:14px; }
  .empty-state .e-title {
    font-family:'Space Grotesk',sans-serif;
    font-size:17px; font-weight:600; color:var(--white);
    margin-bottom:6px;
  }
  .empty-state p { font-size:13px; line-height:1.5; }

  /* ── LOADING ── */
  .loading-wrap {
    display:flex; align-items:center; justify-content:center;
    padding:60px 20px; gap:10px; color:var(--slate); font-size:13px;
  }
  .spinner {
    width:18px; height:18px;
    border:2px solid var(--navy-border);
    border-top-color:var(--teal);
    border-radius:50%;
    animation:spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* ── TOAST ── */
  #toast {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px);
    background:var(--navy-card); border:1px solid var(--navy-border);
    border-radius:12px; padding:12px 20px;
    font-size:13px; font-weight:500;
    box-shadow:0 8px 32px rgba(0,0,0,0.4);
    z-index:300; transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    white-space:nowrap;
  }
  #toast.show { transform:translateX(-50%) translateY(0); }
  #toast.success { color:var(--teal); border-color:rgba(0,212,170,0.3); }
  #toast.error   { color:var(--red);  border-color:rgba(255,61,107,0.3); }

  /* ── APPLY TO STATS TOGGLE ── */
  .stats-toggle {
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 14px;
    background:rgba(0,212,170,0.05);
    border:1px solid rgba(0,212,170,0.15);
    border-radius:10px; margin-bottom:10px;
    font-size:12px;
  }
  .stats-toggle span { color:var(--slate); }
  .stats-toggle strong { color:var(--teal); }
  .toggle-switch {
    position:relative; width:36px; height:20px;
    cursor:pointer;
  }
  .toggle-switch input { opacity:0; width:0; height:0; position:absolute; }
  .toggle-track {
    position:absolute; inset:0;
    background:var(--navy-border); border-radius:20px;
    transition:background 0.2s;
  }
  .toggle-thumb {
    position:absolute; top:3px; left:3px;
    width:14px; height:14px; border-radius:50%;
    background:var(--slate); transition:all 0.2s;
  }
  .toggle-switch input:checked ~ .toggle-track { background:var(--teal-dim); border:1px solid var(--teal); }
  .toggle-switch input:checked ~ .toggle-thumb { transform:translateX(16px); background:var(--teal); }
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="dot"></div>
      Dengue Watch LK
    </div>
    <div class="login-sub">Health Authority Admin</div>

    <label class="field-label">API Base URL</label>
    <input class="field-input" id="api-url" type="url"
      placeholder="https://your-api.railway.app" autocomplete="off">

    <label class="field-label">Admin Token</label>
    <input class="field-input" id="admin-token" type="password"
      placeholder="Your ADMIN_TOKEN" autocomplete="off">

    <button class="btn-primary" onclick="doLogin()">Sign In</button>
    <div class="login-error" id="login-error">Invalid token or cannot reach server.</div>
  </div>
</div>

<!-- ── NAV ── -->
<nav>
  <div class="nav-logo">
    <div class="dot"></div>
    Dengue Watch
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <a href="/" style="font-size:11px;color:var(--slate);text-decoration:none;padding:4px 10px;border:1px solid var(--navy-border);border-radius:20px;font-family:'Inter',sans-serif;">← Main page</a>
    <span class="admin-badge">Admin</span>
    <button class="btn-logout" onclick="doLogout()">Sign out</button>
  </div>
</nav>

<!-- ── APP ── -->
<div id="app">

  <!-- Summary strip -->
  <div class="summary-strip">
    <div class="s-chip pending">
      <div class="s-label">Pending</div>
      <div class="s-val" id="count-pending">—</div>
    </div>
    <div class="s-chip verified">
      <div class="s-label">Verified</div>
      <div class="s-val" id="count-verified">—</div>
    </div>
    <div class="s-chip dismissed">
      <div class="s-label">Dismissed</div>
      <div class="s-val" id="count-dismissed">—</div>
    </div>
    <div class="s-chip total">
      <div class="s-label">Total</div>
      <div class="s-val" id="count-total">—</div>
    </div>
  </div>

  <!-- Filter -->
  <div class="filter-bar">
    <button class="filter-btn active" data-filter="pending"   onclick="setFilter('pending')">Pending</button>
    <button class="filter-btn"        data-filter="verified"  onclick="setFilter('verified')">Verified</button>
    <button class="filter-btn"        data-filter="dismissed" onclick="setFilter('dismissed')">Dismissed</button>
    <button class="filter-btn"        data-filter=""          onclick="setFilter('')">All</button>
  </div>

  <!-- Cards -->
  <div class="reports-wrap" id="reports-wrap">
    <div class="loading-wrap" id="loading">
      <div class="spinner"></div> Loading reports…
    </div>
    <div class="empty-state" id="empty-state">
      <div class="e-icon">✓</div>
      <div class="e-title">All clear</div>
      <p>No reports in this category right now.</p>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
  let API_BASE = '';
  let ADMIN_TOKEN = '';
  let currentFilter = 'pending';
  let allReports = [];

  // ── AUTH ──
  function doLogin() {
    const url   = document.getElementById('api-url').value.trim().replace(/\/$/, '');
    const token = document.getElementById('admin-token').value.trim();
    if (!url || !token) return showLoginError('Please fill in both fields.');

    const btn = document.querySelector('#login-screen .btn-primary');
    btn.textContent = 'Connecting…'; btn.disabled = true;

    fetch(`${url}/api/admin/reports?status=pending`, {
      headers: { 'X-Admin-Token': token }
    })
    .then(r => {
      if (!r.ok) throw new Error('Unauthorized');
      API_BASE    = url;
      ADMIN_TOKEN = token;
      sessionStorage.setItem('dw_api', url);
      sessionStorage.setItem('dw_tok', token);
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      loadReports();
    })
    .catch(() => {
      showLoginError('Invalid token or cannot reach server.');
      btn.textContent = 'Sign In'; btn.disabled = false;
    });
  }

  function doLogout() {
    sessionStorage.removeItem('dw_api');
    sessionStorage.removeItem('dw_tok');
    location.reload();
  }

  function showLoginError(msg) {
    const el = document.getElementById('login-error');
    el.textContent = msg; el.style.display = 'block';
  }

  // Auto-login from session
  window.addEventListener('load', () => {
    const url   = sessionStorage.getItem('dw_api');
    const token = sessionStorage.getItem('dw_tok');
    if (url && token) {
      document.getElementById('api-url').value    = url;
      document.getElementById('admin-token').value = token;
      doLogin();
    }
  });

  // ── LOAD ──
  async function loadReports() {
    document.getElementById('loading').style.display = 'flex';
    document.getElementById('empty-state').style.display = 'none';
    // clear old cards
    document.querySelectorAll('.report-card').forEach(c => c.remove());

    try {
      const res = await fetch(`${API_BASE}/api/admin/reports`, {
        headers: { 'X-Admin-Token': ADMIN_TOKEN }
      });
      allReports = await res.json();
      updateCounts();
      renderReports();
    } catch (err) {
      showToast('Failed to load reports.', 'error');
    }
    document.getElementById('loading').style.display = 'none';
  }

  function updateCounts() {
    const byStatus = s => allReports.filter(r => r.status === s).length;
    document.getElementById('count-pending').textContent   = byStatus('pending');
    document.getElementById('count-verified').textContent  = byStatus('verified');
    document.getElementById('count-dismissed').textContent = byStatus('dismissed');
    document.getElementById('count-total').textContent     = allReports.length;
  }

  function setFilter(f) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.filter === f);
    });
    document.querySelectorAll('.report-card').forEach(c => c.remove());
    renderReports();
  }

  function renderReports() {
    const filtered = currentFilter
      ? allReports.filter(r => r.status === currentFilter)
      : allReports;

    const wrap = document.getElementById('reports-wrap');

    if (filtered.length === 0) {
      document.getElementById('empty-state').style.display = 'block';
      return;
    }
    document.getElementById('empty-state').style.display = 'none';

    filtered.forEach(report => {
      const card = buildCard(report);
      wrap.appendChild(card);
    });
  }

  function buildCard(report) {
    const card = document.createElement('div');
    card.className = 'report-card';
    card.id = `card-${report.id}`;

    const typeLabels = {
      confirmed: 'Confirmed', suspected: 'Suspected',
      death: 'Death', cluster: 'Cluster'
    };
    const locStr = report.location
      ? `${report.location}, ${report.district}`
      : `${report.district}, ${report.province}`;

    const isPending = report.status === 'pending';

    card.innerHTML = `
      <div class="rc-top">
        <div>
          <div class="rc-id">${report.id}</div>
          <div class="rc-location">${locStr}</div>
        </div>
        <span class="rc-tag ${report.caseType}">${typeLabels[report.caseType] || report.caseType}</span>
      </div>

      <div class="rc-meta">
        <div class="rc-meta-item">
          <div class="m-label">Province</div>
          <div class="m-val">${report.province}</div>
        </div>
        <div class="rc-meta-item">
          <div class="m-label">Onset Date</div>
          <div class="m-val">${report.onsetDate ? formatDate(report.onsetDate) : '—'}</div>
        </div>
      </div>

      ${report.details ? `<div class="rc-details" id="det-${report.id}">${escHtml(report.details)}</div>` : ''}

      <div class="rc-status-row">
        <div class="rc-status">
          <div class="status-dot ${report.status}"></div>
          <span style="color:${statusColor(report.status)}">${capitalize(report.status)}</span>
        </div>
        <div class="rc-time">${timeAgo(report.submittedAt)}</div>
      </div>

      ${isPending ? `
        <div class="stats-toggle" id="toggle-wrap-${report.id}">
          <div>
            <strong>Apply to stats</strong><br>
            <span>Updates district & province counts</span>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="apply-${report.id}" checked>
            <div class="toggle-track"></div>
            <div class="toggle-thumb"></div>
          </label>
        </div>
        <div class="rc-actions" id="actions-${report.id}">
          ${report.details ? `<button class="btn-details" onclick="toggleDetails('${report.id}')">Details</button>` : ''}
          <button class="btn-dismiss" onclick="reviewReport('${report.id}','dismissed')">Dismiss</button>
          <button class="btn-verify"  onclick="reviewReport('${report.id}','verified')">✓ Verify</button>
        </div>
      ` : `
        <div class="rc-actions hidden"></div>
        ${report.details ? `<button class="btn-details" onclick="toggleDetails('${report.id}')" style="margin-top:4px">Details</button>` : ''}
      `}
    `;
    return card;
  }

  // ── REVIEW ──
  async function reviewReport(id, status) {
    const applyToStats = document.getElementById(`apply-${id}`)?.checked ?? false;
    const card = document.getElementById(`card-${id}`);

    const btn = card.querySelector(status === 'verified' ? '.btn-verify' : '.btn-dismiss');
    const origText = btn.textContent;
    btn.textContent = '…'; btn.disabled = true;

    try {
      const res = await fetch(`${API_BASE}/api/admin/reports/${id}`, {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          'X-Admin-Token': ADMIN_TOKEN
        },
        body: JSON.stringify({ status, applyToStats })
      });
      if (!res.ok) throw new Error('Failed');

      card.classList.add('just-actioned');
      const msg = status === 'verified'
        ? `✓ Verified${applyToStats ? ' & stats updated' : ''}`
        : 'Dismissed';
      showToast(msg, 'success');

      // Update local data
      const r = allReports.find(r => r.id === id);
      if (r) r.status = status;
      updateCounts();

      setTimeout(() => {
        card.remove();
        if (!document.querySelector('.report-card')) {
          document.getElementById('empty-state').style.display = 'block';
        }
      }, 600);
    } catch {
      btn.textContent = origText; btn.disabled = false;
      showToast('Action failed. Try again.', 'error');
    }
  }

  function toggleDetails(id) {
    const el = document.getElementById(`det-${id}`);
    if (el) el.classList.toggle('show');
  }

  // ── HELPERS ──
  function timeAgo(iso) {
    if (!iso) return '—';
    const mins = Math.floor((Date.now() - new Date(iso)) / 60000);
    if (mins < 1)  return 'just now';
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24)  return `${hrs}h ago`;
    return `${Math.floor(hrs / 24)}d ago`;
  }

  function formatDate(d) {
    if (!d) return '—';
    return new Date(d).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
  }

  function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function statusColor(s) {
    return s === 'verified' ? 'var(--teal)' : s === 'dismissed' ? 'var(--slate)' : 'var(--amber)';
  }

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `show ${type}`;
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.className = ''; }, 3000);
  }

  // Enter key on login
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') {
      doLogin();
    }
  });
</script>
</body>
</html>
